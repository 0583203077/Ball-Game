<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>The Ball Game</title>
</head>

<body>
    <h1>The Ball Game</h1>
    <div class="top-buttons">
        <button class="undo-btn" onclick="undo(this)"> ← </button>
                <button class="redo-btn" onclick="redo(this)"> → </button>
    </div>
    <div class="ball ball1" onclick="onBallClick(this,300)"></div>
    <div class="ball ball2" onclick="onBallClick(this,500)"></div>
    <div class="ball ball3" onclick="onBall3Click()"></div>
    <div class="ball ball4" onclick="onBall4Click()"></div>
    <div class="ball ball5" onclick="onBall5Click()"></div>
    <div class="ball ball6" onclick="onBall6Click()"></div>
    <script src="util.js"></script>
    <script src="main.js"></script>
</body>

</html>
